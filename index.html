    <meta name="description" content="Sistema de registro horario para trabajadores y portal de auditoría de cumplimiento laboral.">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="stylesheet" href="styles/main.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.SUPABASE_URL = "https://jronohxljvanawpyuctb.supabase.co";
        window.SUPABASE_KEY = "sb_publishable_AJOyDQKymOUlvlGxfOmNkQ_fi8g3jGY";
    </script>
</head>
<body>
    <!-- TEMPORARY ONSCREEN ERROR LOGGER -->
    <div id="debug-error-log" style="position: fixed; top: 0; left: 0; z-index: 999999; background: rgba(255,0,0,0.9); color: white; width: 100%; padding: 10px; font-family: monospace; display: none;"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const logPanel = document.getElementById('debug-error-log');
            logPanel.style.display = 'block';
            logPanel.innerHTML += '<p><strong>Error:</strong> ' + msg + ' <br><strong>Archivo:</strong> ' + url + ' (Línea ' + lineNo + ')</p>';
            return false;
        };
        // Also capture unhandled promise rejections
        window.addEventListener('unhandledrejection', function(event) {
            const logPanel = document.getElementById('debug-error-log');
            logPanel.style.display = 'block';
            logPanel.innerHTML += '<p><strong>Promesa Rechazada:</strong> ' + (event.reason ? event.reason.message || event.reason : 'Desconocido') + '</p>';
        });
    </script>
    
    <div id="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main id="app">
        <!-- Views will be injected here by the router -->
    </main>

    <!-- Notification Container (Toast) -->
    <div id="toast-container"></div>

    <!-- Main entry point -->
    <script type="module" src="js/app.js?v=999"></script>
</body>
